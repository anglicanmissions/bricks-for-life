<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKS FOR LIFE | Anglican World Aid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&display=swap');
        
        :root { --brand-orange: #f26522; --bg-intensity: 255; }
        
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            background-color: rgb(var(--bg-intensity), var(--bg-intensity), var(--bg-intensity));
            transition: background-color 0.4s ease;
        }

        /* Micro-Texture Overlay */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.04; pointer-events: none; z-index: 9999;
        }

        /* Fixed Navigation */
        .nav-scrolled { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid #f1f5f9; padding: 1rem 2rem; }
        .nav-link { position: relative; color: #64748b; transition: color 0.3s ease; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; }
        .nav-link.active { color: var(--brand-orange); }

        /* Hero Architecture - The fix for the blank space */
        .hero-container { height: 280vh; position: relative; }
        .hero-sticky { position: sticky; top: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* The "Dropped Deck" Fix */
        .card-img {
            position: absolute !important; /* Critical: keeps them clustered in the center */
            border-radius: 1rem; object-fit: cover;
            box-shadow: 0 40px 80px rgba(0,0,0,0.25);
            transition: transform 0.1s linear, filter 0.5s ease; 
            z-index: 10; /* Keeps images below text */
            border: 6px solid white;
            width: clamp(240px, 35vw, 500px);
            height: clamp(320px, 45vw, 650px);
            filter: grayscale(100%);
        }

        /* Headline: Bolder & Tighter */
        .hero-text-overlay { 
            z-index: 100; /* Ensures text is always on top */
            pointer-events: none; text-align: center; width: 100%; padding: 0 1rem; 
        }
        .hero-title { 
            font-[950] tracking-[-0.06em] leading-[0.78] text-slate-950; 
            font-size: clamp(3.5rem, 12vw, 10.5rem);
            filter: drop-shadow(0 0 50px rgba(255,255,255,1));
        }
        
        @media (min-width: 768px) { .zoom-effect { transition: transform 0.1s linear; } }

        .hero-discovery { 
            opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); 
            pointer-events: none; margin-top: 3rem;
        }
        .hero-discovery.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        /* Smooth Video */
        #video-trigger { 
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1); 
            width: 95%; max-width: 1440px; border-radius: 2.5rem; overflow: hidden;
        }
        .video-active #video-trigger { transform: scale(1.05); }

        .big-number { font-size: clamp(6rem, 18vw, 15rem); font-weight: 900; color: #f1f5f9; position: absolute; z-index: -1; top: -5rem; left: -2rem; }
    </style>
</head>
<body class="antialiased">

    <nav id="main-nav" class="fixed w-full z-[100] px-8 py-8 transition-all duration-500 flex justify-center">
        <div class="max-w-7xl w-full flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="font-[900] text-2xl tracking-tighter uppercase italic">Bricks <span class="text-[#f26522]">For Life</span></span>
            </div>
            <div class="hidden md:flex items-center gap-10">
                <a href="#context" class="nav-link">Context</a>
                <a href="#bio" class="nav-link">Amlaku</a>
                <a href="#story" class="nav-link">Story</a>
                <a href="#soap" class="nav-link">Enterprise</a>
                <a href="https://anglicanmissions.org.nz/donate" class="bg-slate-950 text-white px-8 py-3 rounded-full hover:bg-[#f26522] transition-all ml-4 text-[10px] font-black uppercase tracking-widest">Donate</a>
            </div>
        </div>
    </nav>

    <div class="hero-container">
        <div class="hero-sticky">
            <img src="https://anglicanmissions.org.nz/wp-content/uploads/2022/12/bricks-for-life_banner_1232x864px-1.png" id="c1" class="card-img" style="transform: rotate(-3deg) translate(15px, 15px);" alt="Landscape">
            <img src="https://anglicanmissions.org.nz/wp-content/uploads/2022/12/bricks-for-life-5_img_content-992x784px.png" id="c2" class="card-img" style="transform: rotate(2deg) translate(-10px, -10px);" alt="Agri">
            <img src="https://anglicanmissions.org.nz/wp-content/uploads/2022/12/bricks-for-life-3_img_content-992x784px.png" id="c3" class="card-img" style="transform: rotate(-4deg) translate(-15px, 10px);" alt="Water">
            <img src="https://anglicanmissions.org.nz/wp-content/uploads/2022/12/bricks-for-life-7_img_content-992x784px.png" id="c4" class="card-img" style="transform: rotate(3deg) translate(20px, -15px);" alt="Village">

            <div class="hero-text-overlay">
                <h1 id="hero-title" class="hero-title zoom-effect">
                    Bricks for<br><span class="text-[#f26522]">Life</span>
                </h1>
                
                <div id="hero-reveal-zone" class="hero-discovery">
                    <p class="text-xl md:text-2xl text-slate-500 font-medium max-w-xl mx-auto mb-10 leading-snug">
                        Transforming Baregota through crop science, irrigation foundations, and community agency.
                    </p>
                    <div class="flex flex-col sm:flex-row gap-6 justify-center items-center">
                        <a href="https://anglicanmissions.org.nz/donate" class="bg-slate-950 text-white px-12 py-5 rounded-2xl font-bold hover:bg-[#f26522] transition-all shadow-2xl uppercase tracking-widest text-[11px]">Support Now</a>
                        <a href="#video-section" class="flex items-center gap-3 font-bold text-slate-900 group">
                            <span class="w-12 h-12 rounded-full border-2 border-slate-200 flex items-center justify-center group-hover:bg-slate-50 transition-all"><i data-lucide="play" class="w-4 h-4 fill-slate-900"></i></span>
                            <span class="text-[10px] uppercase tracking-widest font-black">Watch Story</span>
                        </a>
                    </div>
                </div>
            </div>

            <button onclick="document.getElementById('spark').scrollIntoView({behavior: 'smooth'})" id="hero-skip" class="absolute bottom-12 bg-white px-8 py-4 rounded-full flex items-center gap-3 text-[10px] font-[900] uppercase tracking-[0.25em] shadow-lg hover:bg-[#f26522] hover:text-white transition-all">
                The Spark <i data-lucide="arrow-down" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <section id="spark" class="py-64 px-8 bg-white text-center section-anchor">
        <div class="max-w-5xl mx-auto" data-aos="fade-up">
            <span class="text-[#f26522] font-black uppercase tracking-[0.4em] text-[10px] mb-12 block">The Spark</span>
            <blockquote class="text-4xl md:text-8xl font-[900] tracking-tighter leading-none text-slate-950 mb-12">
                “Please sir, <br><span class="text-[#f26522]">I want to go <br>to university.”</span>
            </blockquote>
            <p class="text-xl text-slate-400 font-medium max-w-2xl mx-auto">One faith-filled question that changed everything.</p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true, easing: 'ease-out-quint' });
        lucide.createIcons();

        const nav = document.getElementById('main-nav');
        const heroTitle = document.getElementById('hero-title');
        const heroDiscovery = document.getElementById('hero-reveal-zone');
        const heroSkip = document.getElementById('hero-skip');
        const videoSection = document.getElementById('video-section');
        const videoCard = document.getElementById('video-trigger');
        const cards = [document.getElementById('c1'), document.getElementById('c2'), document.getElementById('c3'), document.getElementById('c4')];

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const viewH = window.innerHeight;
            const scrollPercent = Math.min(scrollY / (viewH * 1.3), 1.5);
            const isMobile = window.innerWidth < 768;
            
            // Scatter & Color Logic
            const saturation = Math.min(100, scrollPercent * 180);
            cards.forEach((card, i) => {
                const offsets = [{x:-900,y:-700,r:-30},{x:1000,y:-800,r:25},{x:-800,y:900,r:-20},{x:900,y:700,r:35}];
                card.style.transform = `translate(${scrollPercent * offsets[i].x}px, ${scrollPercent * offsets[i].y}px) rotate(${offsets[i].r}deg) scale(1.1)`;
                card.style.filter = `grayscale(${100 - saturation}%)`;
            });

            if (!isMobile) heroTitle.style.transform = `scale(${1 + scrollPercent * 0.15})`;

            if (scrollPercent > 0.45) {
                heroDiscovery.classList.add('visible');
                heroSkip.style.opacity = 0;
            } else {
                heroDiscovery.classList.remove('visible');
                heroSkip.style.opacity = 1;
            }

            // Smooth Theater Transition
            const videoRect = videoSection ? videoSection.getBoundingClientRect() : null;
            if (videoRect && videoRect.top < viewH * 0.45 && videoRect.bottom > viewH * 0.2) {
                let sectionMiddle = videoRect.top + (videoRect.height / 2);
                let distance = Math.abs(viewH / 2 - sectionMiddle);
                let progress = Math.max(0, 1 - (distance / 450));
                let intensity = Math.floor(255 - (Math.pow(progress, 2.5) * 253));
                document.documentElement.style.setProperty('--bg-intensity', intensity);
                if (distance < 300) videoCard.classList.add('video-active');
                else videoCard.classList.remove('video-active');
            } else {
                document.documentElement.style.setProperty('--bg-intensity', 255);
            }

            if (scrollY > 100) nav.classList.add('nav-scrolled');
            else nav.classList.remove('nav-scrolled');
        });
    </script>
</body>
</html>
